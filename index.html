
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUNPACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'off-black': '#0A0A0A',
              'neon-volt': '#CCFF00',
              'cobalt-blue': '#0055FF',
            },
            fontFamily: {
              'display': ['"Archivo Black"', 'sans-serif'],
              'mono': ['"JetBrains Mono"', 'monospace'],
              'sans': ['"Inter"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-blue: #00f3ff;
        --neon-pink: #ff00ff;
        --neon-purple: #bc13fe;
        --neon-lime: #39ff14;
        --neon-cyan: #0ff0fc;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
        overflow-x: hidden;
        transition: background-color 0.3s, color 0.3s;
      }
      
      html.dark body {
        background-color: #020617;
        color: #f1f5f9;
      }
      
      /* New Glassmorphism logic */
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 28px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }
      
      html.dark .glass-panel {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: none;
      }
      
      .glass-panel:hover {
        border-color: rgba(0, 0, 0, 0.15);
        background: rgba(255, 255, 255, 0.9);
      }

      html.dark .glass-panel:hover {
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(15, 23, 42, 0.5);
      }

      .bento-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-auto-rows: minmax(100px, auto);
        gap: 1.5rem;
      }

      /* Glowing utilities */
      .glow-cyan { box-shadow: 0 0 30px rgba(6, 182, 212, 0.15); }
      .glow-pink { box-shadow: 0 0 30px rgba(219, 39, 119, 0.15); }
      .glow-lime { box-shadow: 0 0 30px rgba(101, 163, 13, 0.15); }

      .fun-text-gradient {
        background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      @keyframes slide-in-rail {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      
      .animate-rail { animation: slide-in-rail 0.6s ease-out forwards; }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      html.dark ::-webkit-scrollbar-track { background: #020617; }
      html.dark ::-webkit-scrollbar-thumb { background: #1e293b; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
